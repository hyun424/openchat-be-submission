spring.application.name=openchat

# ===============================
# Datasource (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://${env.DB_HOST:localhost}:${env.DB_PORT:3306}/${env.DB_NAME:openchat}\
?useSSL=false\
&serverTimezone=Asia/Seoul\
&allowPublicKeyRetrieval=true

spring.datasource.username=${env.DB_USERNAME:openchat}
spring.datasource.password=${env.DB_PASSWORD:openchat}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# HikariCP Connection Pool
# ===============================
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.leak-detection-threshold=10000

# ===============================
# Tomcat Thread Pool
# ===============================
server.tomcat.threads.max=400
server.tomcat.threads.min-spare=50
server.tomcat.accept-count=200

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate

# ===============================
# Redis (optional - app works without it, just slower)
# ===============================
spring.data.redis.host=${env.REDIS_HOST:localhost}
spring.data.redis.port=${env.REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=2000ms
spring.data.redis.lettuce.pool.max-active=32
spring.data.redis.lettuce.pool.max-idle=16
spring.data.redis.lettuce.pool.min-idle=8

# ===============================
# JWT
# ===============================
# JWT secret must be provided by environment or a non-production profile.
jwt.secret=${env.JWT_SECRET}
jwt.expiration-ms=${env.JWT_EXPIRATION_MS:43200000}

# ===============================
# App
# ===============================
app.role=${env.APP_ROLE:combined}
app.instance-id=${env.INSTANCE_ID:${HOSTNAME:${random.uuid}}}
app.websocket.enabled=${env.WEBSOCKET_ENABLED:true}
app.websocket.broadcast.lanes=${env.WS_BROADCAST_LANES:16}
app.websocket.broadcast.queue-capacity-per-lane=${env.WS_BROADCAST_QUEUE_CAPACITY_PER_LANE:10000}
app.websocket.broadcast.shutdown-timeout-ms=${env.WS_BROADCAST_SHUTDOWN_TIMEOUT_MS:5000}
app.websocket.active-ttl-ms=${env.WS_ACTIVE_TTL_MS:60000}
app.websocket.batch.enabled=${env.WS_BATCH_ENABLED:true}
app.websocket.batch.window-ms=${env.WS_BATCH_WINDOW_MS:20}
app.websocket.batch.warm-window-ms=${env.WS_BATCH_WARM_WINDOW_MS:30}
app.websocket.batch.hot-window-ms=${env.WS_BATCH_HOT_WINDOW_MS:100}
app.websocket.batch.super-hot-window-ms=${env.WS_BATCH_SUPER_HOT_WINDOW_MS:250}
app.websocket.batch.max-size=${env.WS_BATCH_MAX_SIZE:64}
app.websocket.batch.max-flush-batches-per-run=${env.WS_BATCH_MAX_FLUSH_BATCHES_PER_RUN:16}
app.websocket.controlled-realtime.enabled=${env.WS_CONTROLLED_REALTIME_ENABLED:true}
app.websocket.controlled-realtime.hot-max-messages-per-sec=${env.WS_HOT_LIVE_MAX_MESSAGES_PER_SEC:100}
app.websocket.controlled-realtime.super-hot-max-messages-per-sec=${env.WS_SUPER_HOT_LIVE_MAX_MESSAGES_PER_SEC:50}
app.redis.subscriber.enabled=${env.REDIS_SUBSCRIBER_ENABLED:true}

# Transactional outbox worker
app.live-publish.enabled=${env.LIVE_PUBLISH_ENABLED:true}
app.live-publish.threads=${env.LIVE_PUBLISH_THREADS:8}
app.live-publish.queue-capacity=${env.LIVE_PUBLISH_QUEUE_CAPACITY:100000}
app.outbox.published-marker.enabled=${env.OUTBOX_PUBLISHED_MARKER_ENABLED:true}
app.outbox.published-marker.queue-capacity=${env.OUTBOX_PUBLISHED_MARKER_QUEUE_CAPACITY:200000}
app.outbox.published-marker.batch-size=${env.OUTBOX_PUBLISHED_MARKER_BATCH_SIZE:500}
app.outbox.published-marker.flush-interval-ms=${env.OUTBOX_PUBLISHED_MARKER_FLUSH_INTERVAL_MS:25}
app.outbox.enabled=${env.OUTBOX_ENABLED:true}
app.outbox.poll-interval-ms=${env.OUTBOX_POLL_INTERVAL_MS:100}
app.outbox.batch-size=${env.OUTBOX_BATCH_SIZE:100}
app.outbox.max-attempts=${env.OUTBOX_MAX_ATTEMPTS:20}
app.outbox.processing-timeout-ms=${env.OUTBOX_PROCESSING_TIMEOUT_MS:30000}
app.outbox.initial-retry-delay-ms=${env.OUTBOX_INITIAL_RETRY_DELAY_MS:1000}
app.room-metadata.enabled=${env.ROOM_METADATA_ENABLED:true}
app.room-metadata.flush-interval-ms=${env.ROOM_METADATA_FLUSH_INTERVAL_MS:1000}
app.room.hot-state.window-seconds=${env.ROOM_HOT_STATE_WINDOW_SECONDS:10}
app.room.hot-state.max-latency-samples=${env.ROOM_HOT_STATE_MAX_LATENCY_SAMPLES:2048}
app.room.hot-state.inactive-ttl-ms=${env.ROOM_HOT_STATE_INACTIVE_TTL_MS:300000}
app.room.hot-state.upgrade-stable-ms=${env.ROOM_HOT_STATE_UPGRADE_STABLE_MS:5000}
app.room.hot-state.downgrade-stable-ms=${env.ROOM_HOT_STATE_DOWNGRADE_STABLE_MS:60000}
app.room.hot-state.watched-connected-sessions=${env.ROOM_HOT_STATE_WATCHED_CONNECTED_SESSIONS:50}
app.room.hot-state.watched-outbound-fanout-per-sec=${env.ROOM_HOT_STATE_WATCHED_OUTBOUND_FANOUT_PER_SEC:1000}
app.room.hot-state.warm-join-rate-per-sec=${env.ROOM_HOT_STATE_WARM_JOIN_RATE_PER_SEC:5}
app.room.hot-state.warm-delivery-lag-p95-ms=${env.ROOM_HOT_STATE_WARM_DELIVERY_LAG_P95_MS:50}
app.room.hot-state.warm-outbound-fanout-per-sec=${env.ROOM_HOT_STATE_WARM_OUTBOUND_FANOUT_PER_SEC:5000}
app.room.hot-state.hot-inbound-messages-per-sec=${env.ROOM_HOT_STATE_HOT_INBOUND_MESSAGES_PER_SEC:30}
app.room.hot-state.hot-delivery-lag-p95-ms=${env.ROOM_HOT_STATE_HOT_DELIVERY_LAG_P95_MS:100}
app.room.hot-state.hot-outbound-fanout-per-sec=${env.ROOM_HOT_STATE_HOT_OUTBOUND_FANOUT_PER_SEC:10000}
app.room.hot-state.super-hot-connected-sessions=${env.ROOM_HOT_STATE_SUPER_HOT_CONNECTED_SESSIONS:500}
app.room.hot-state.super-hot-delivery-lag-p95-ms=${env.ROOM_HOT_STATE_SUPER_HOT_DELIVERY_LAG_P95_MS:300}
app.room.hot-state.super-hot-outbound-fanout-per-sec=${env.ROOM_HOT_STATE_SUPER_HOT_OUTBOUND_FANOUT_PER_SEC:50000}
app.room.scale.upgrade-stable-ms=${env.ROOM_SCALE_UPGRADE_STABLE_MS:180000}
app.room.scale.downgrade-stable-ms=${env.ROOM_SCALE_DOWNGRADE_STABLE_MS:600000}
app.room.scale.medium-room-work-per-sec=${env.ROOM_SCALE_MEDIUM_ROOM_WORK_PER_SEC:1000}
app.room.scale.large-room-work-per-sec=${env.ROOM_SCALE_LARGE_ROOM_WORK_PER_SEC:5000}
app.room.scale.hot-room-work-per-sec=${env.ROOM_SCALE_HOT_ROOM_WORK_PER_SEC:10000}
app.room.scale.critical-room-work-per-sec=${env.ROOM_SCALE_CRITICAL_ROOM_WORK_PER_SEC:20000}
app.room.scale.pod-work-budget-delivery-per-sec=${ROOM_SCALE_POD_WORK_BUDGET_DELIVERY_PER_SEC:${env.ROOM_SCALE_POD_WORK_BUDGET_DELIVERY_PER_SEC:10000}}
app.room.scale.max-active-sessions-per-partition=${env.ROOM_SCALE_MAX_ACTIVE_SESSIONS_PER_PARTITION:500}
app.room.scale.max-partition-limit=${env.ROOM_SCALE_MAX_PARTITION_LIMIT:16}
app.room-shard.enabled=${ROOM_SHARD_ENABLED:${env.ROOM_SHARD_ENABLED:false}}
app.room-shard.shard-count=${ROOM_SHARD_COUNT:${env.ROOM_SHARD_COUNT:1}}
app.room-shard.owned-shards=${ROOM_SHARD_OWNED_SHARDS:${env.ROOM_SHARD_OWNED_SHARDS:0}}
app.room-shard.legacy-subscribe-enabled=${ROOM_SHARD_LEGACY_SUBSCRIBE_ENABLED:${env.ROOM_SHARD_LEGACY_SUBSCRIBE_ENABLED:true}}
app.room-shard.pod-work-budget-delivery-per-sec=${ROOM_SHARD_POD_WORK_BUDGET_DELIVERY_PER_SEC:${env.ROOM_SHARD_POD_WORK_BUDGET_DELIVERY_PER_SEC:10000}}
app.room-shard.overload-threshold-ratio=${ROOM_SHARD_OVERLOAD_THRESHOLD_RATIO:${env.ROOM_SHARD_OVERLOAD_THRESHOLD_RATIO:0.8}}
app.room-shard.max-active-sessions-per-partition=${ROOM_SHARD_MAX_ACTIVE_SESSIONS_PER_PARTITION:${env.ROOM_SHARD_MAX_ACTIVE_SESSIONS_PER_PARTITION:500}}
app.room-shard.queue-depth-threshold=${ROOM_SHARD_QUEUE_DEPTH_THRESHOLD:${env.ROOM_SHARD_QUEUE_DEPTH_THRESHOLD:5000}}
app.room-shard.overload-stable-ms=${ROOM_SHARD_OVERLOAD_STABLE_MS:${env.ROOM_SHARD_OVERLOAD_STABLE_MS:30000}}
app.room-shard.recovery-stable-ms=${ROOM_SHARD_RECOVERY_STABLE_MS:${env.ROOM_SHARD_RECOVERY_STABLE_MS:180000}}
app.room-partition.enabled=${ROOM_PARTITION_ENABLED:${env.ROOM_PARTITION_ENABLED:false}}
app.room-partition.partition-count=${ROOM_PARTITION_COUNT:${env.ROOM_PARTITION_COUNT:1}}
app.room-partition.owned-partitions=${ROOM_PARTITION_OWNED_PARTITIONS:${env.ROOM_PARTITION_OWNED_PARTITIONS:0}}
app.room-partition.hot-tier-threshold=${ROOM_PARTITION_HOT_TIER_THRESHOLD:${env.ROOM_PARTITION_HOT_TIER_THRESHOLD:CRITICAL}}
app.room-partition.max-partitions-per-room=${ROOM_PARTITION_MAX_PARTITIONS_PER_ROOM:${env.ROOM_PARTITION_MAX_PARTITIONS_PER_ROOM:16}}
app.room-partition.admin-api-enabled=${ROOM_PARTITION_ADMIN_API_ENABLED:${env.ROOM_PARTITION_ADMIN_API_ENABLED:false}}
app.room-partition.assignment.enabled=${ROOM_PARTITION_ASSIGNMENT_ENABLED:${env.ROOM_PARTITION_ASSIGNMENT_ENABLED:false}}
app.room-partition.assignment.heartbeat-interval-ms=${ROOM_PARTITION_ASSIGNMENT_HEARTBEAT_INTERVAL_MS:${env.ROOM_PARTITION_ASSIGNMENT_HEARTBEAT_INTERVAL_MS:5000}}
app.room-partition.assignment.retention-ms=${ROOM_PARTITION_ASSIGNMENT_RETENTION_MS:${env.ROOM_PARTITION_ASSIGNMENT_RETENTION_MS:15000}}
app.room-partition.assignment.ws-url=${ROOM_PARTITION_ASSIGNMENT_WS_URL:${env.ROOM_PARTITION_ASSIGNMENT_WS_URL:ws://127.0.0.1:8080}}
app.room-partition.assignment.dynamic-subscribe-enabled=${ROOM_PARTITION_ASSIGNMENT_DYNAMIC_SUBSCRIBE_ENABLED:${env.ROOM_PARTITION_ASSIGNMENT_DYNAMIC_SUBSCRIBE_ENABLED:false}}
app.room-partition.assignment.subscriber-refresh-ms=${ROOM_PARTITION_ASSIGNMENT_SUBSCRIBER_REFRESH_MS:${env.ROOM_PARTITION_ASSIGNMENT_SUBSCRIBER_REFRESH_MS:5000}}
app.room-partition.assignment.unsubscribe-grace-ms=${ROOM_PARTITION_ASSIGNMENT_UNSUBSCRIBE_GRACE_MS:${env.ROOM_PARTITION_ASSIGNMENT_UNSUBSCRIBE_GRACE_MS:30000}}
app.room-partition.assignment.node-drain-enabled=${ROOM_PARTITION_ASSIGNMENT_NODE_DRAIN_ENABLED:${env.ROOM_PARTITION_ASSIGNMENT_NODE_DRAIN_ENABLED:false}}
app.room-partition.assignment.node-drain-reconnect-limit=${ROOM_PARTITION_ASSIGNMENT_NODE_DRAIN_RECONNECT_LIMIT:${env.ROOM_PARTITION_ASSIGNMENT_NODE_DRAIN_RECONNECT_LIMIT:200}}
app.room-partition.assignment.node-drain-retry-after-ms=${ROOM_PARTITION_ASSIGNMENT_NODE_DRAIN_RETRY_AFTER_MS:${env.ROOM_PARTITION_ASSIGNMENT_NODE_DRAIN_RETRY_AFTER_MS:500}}
app.room-partition.assignment.node-drain-readiness-timeout-ms=${ROOM_PARTITION_ASSIGNMENT_NODE_DRAIN_READINESS_TIMEOUT_MS:${env.ROOM_PARTITION_ASSIGNMENT_NODE_DRAIN_READINESS_TIMEOUT_MS:15000}}
app.room-partition.lifecycle.enabled=${ROOM_PARTITION_LIFECYCLE_ENABLED:${env.ROOM_PARTITION_LIFECYCLE_ENABLED:false}}
app.room-partition.lifecycle.interval-ms=${ROOM_PARTITION_LIFECYCLE_INTERVAL_MS:${env.ROOM_PARTITION_LIFECYCLE_INTERVAL_MS:5000}}
app.room-partition.lifecycle.lease-ttl-ms=${ROOM_PARTITION_LIFECYCLE_LEASE_TTL_MS:${env.ROOM_PARTITION_LIFECYCLE_LEASE_TTL_MS:15000}}
app.room-partition.lifecycle.max-actions-per-run=${ROOM_PARTITION_LIFECYCLE_MAX_ACTIONS_PER_RUN:${env.ROOM_PARTITION_LIFECYCLE_MAX_ACTIONS_PER_RUN:1}}
app.room-partition.lifecycle.updated-by=${ROOM_PARTITION_LIFECYCLE_UPDATED_BY:${env.ROOM_PARTITION_LIFECYCLE_UPDATED_BY:auto-partition-lifecycle}}
app.room-partition.lifecycle.scale-up.enabled=${ROOM_PARTITION_LIFECYCLE_SCALE_UP_ENABLED:${env.ROOM_PARTITION_LIFECYCLE_SCALE_UP_ENABLED:true}}
app.room-partition.lifecycle.scale-up.stable-window-ms=${ROOM_PARTITION_LIFECYCLE_SCALE_UP_STABLE_WINDOW_MS:${env.ROOM_PARTITION_LIFECYCLE_SCALE_UP_STABLE_WINDOW_MS:30000}}
app.room-partition.lifecycle.scale-up.min-observations=${ROOM_PARTITION_LIFECYCLE_SCALE_UP_MIN_OBSERVATIONS:${env.ROOM_PARTITION_LIFECYCLE_SCALE_UP_MIN_OBSERVATIONS:2}}
app.room-partition.lifecycle.scale-up.cooldown-ms=${ROOM_PARTITION_LIFECYCLE_SCALE_UP_COOLDOWN_MS:${env.ROOM_PARTITION_LIFECYCLE_SCALE_UP_COOLDOWN_MS:300000}}
app.room-partition.lifecycle.scale-down.enabled=${ROOM_PARTITION_LIFECYCLE_SCALE_DOWN_ENABLED:${env.ROOM_PARTITION_LIFECYCLE_SCALE_DOWN_ENABLED:true}}
app.room-partition.lifecycle.scale-down.stable-window-ms=${ROOM_PARTITION_LIFECYCLE_SCALE_DOWN_STABLE_WINDOW_MS:${env.ROOM_PARTITION_LIFECYCLE_SCALE_DOWN_STABLE_WINDOW_MS:300000}}
app.room-partition.lifecycle.scale-down.min-observations=${ROOM_PARTITION_LIFECYCLE_SCALE_DOWN_MIN_OBSERVATIONS:${env.ROOM_PARTITION_LIFECYCLE_SCALE_DOWN_MIN_OBSERVATIONS:3}}
app.room-partition.lifecycle.scale-down.cooldown-ms=${ROOM_PARTITION_LIFECYCLE_SCALE_DOWN_COOLDOWN_MS:${env.ROOM_PARTITION_LIFECYCLE_SCALE_DOWN_COOLDOWN_MS:600000}}
app.room-partition.lifecycle.scale-down.min-partition-age-ms=${ROOM_PARTITION_LIFECYCLE_SCALE_DOWN_MIN_PARTITION_AGE_MS:${env.ROOM_PARTITION_LIFECYCLE_SCALE_DOWN_MIN_PARTITION_AGE_MS:600000}}
app.room-partition.lifecycle.scale-down.auto-managed-only=${ROOM_PARTITION_LIFECYCLE_SCALE_DOWN_AUTO_MANAGED_ONLY:${env.ROOM_PARTITION_LIFECYCLE_SCALE_DOWN_AUTO_MANAGED_ONLY:true}}
app.room-partition.lifecycle.redistribution.enabled=${ROOM_PARTITION_LIFECYCLE_REDISTRIBUTION_ENABLED:${env.ROOM_PARTITION_LIFECYCLE_REDISTRIBUTION_ENABLED:true}}
app.room-partition.lifecycle.redistribution.limit-per-partition=${ROOM_PARTITION_LIFECYCLE_REDISTRIBUTION_LIMIT_PER_PARTITION:${env.ROOM_PARTITION_LIFECYCLE_REDISTRIBUTION_LIMIT_PER_PARTITION:50}}
app.room-partition.lifecycle.redistribution.retry-after-ms=${ROOM_PARTITION_LIFECYCLE_REDISTRIBUTION_RETRY_AFTER_MS:${env.ROOM_PARTITION_LIFECYCLE_REDISTRIBUTION_RETRY_AFTER_MS:500}}
app.room-partition.lifecycle.drain.complete-empty-observations=${ROOM_PARTITION_LIFECYCLE_DRAIN_COMPLETE_EMPTY_OBSERVATIONS:${env.ROOM_PARTITION_LIFECYCLE_DRAIN_COMPLETE_EMPTY_OBSERVATIONS:2}}
app.room-partition.lifecycle.drain.reconnect-limit-per-partition=${ROOM_PARTITION_LIFECYCLE_DRAIN_RECONNECT_LIMIT_PER_PARTITION:${env.ROOM_PARTITION_LIFECYCLE_DRAIN_RECONNECT_LIMIT_PER_PARTITION:50}}
app.room-partition.lifecycle.drain.reconnect-retry-after-ms=${ROOM_PARTITION_LIFECYCLE_DRAIN_RECONNECT_RETRY_AFTER_MS:${env.ROOM_PARTITION_LIFECYCLE_DRAIN_RECONNECT_RETRY_AFTER_MS:500}}

# ===============================
# Kafka (for Redis failover)
# ===============================
spring.kafka.bootstrap-servers=${env.KAFKA_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=chat-fanout-${app.instance-id}
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=manual
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=io.hyun424.openchat.chat.message.dto

# ===============================
# OAuth (Google)
# ===============================
spring.security.oauth2.client.registration.google.client-id=${env.GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${env.GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile

# ===============================
# OAuth Redirect URLs
# ===============================
app.oauth.success-redirect-url=${env.OAUTH_SUCCESS_URL:http://localhost:3000/oauth/callback}
app.oauth.nickname-setup-url=${env.OAUTH_NICKNAME_URL:http://localhost:3000/nickname-setup}

# ===============================
# CORS (Security)
# ===============================
# Production: https://yourdomain.com (comma-separated for multiple origins)
cors.allowed-origins=${env.CORS_ORIGINS:http://localhost:3000}

# ===============================
# Rate Limiting
# ===============================
# API: 100 requests per minute (per user/IP)
ratelimit.api.limit=100
ratelimit.api.window-seconds=60
# Auth endpoints: 10 requests per minute (brute-force prevention)
ratelimit.api.auth.limit=10
ratelimit.api.auth.window-seconds=60
# WebSocket: 10 messages per second (per user)
ratelimit.ws.message-limit=10
ratelimit.ws.window-seconds=1

# ===============================
# Cookie Security (OAuth)
# ===============================
app.cookie.secure=${env.COOKIE_SECURE:false}
app.cookie.domain=${env.COOKIE_DOMAIN:}
app.cookie.max-age-seconds=43200

# ===============================
# Actuator & Monitoring
# ===============================
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true
management.endpoint.prometheus.enabled=true
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
management.metrics.tags.application=openchat

spring.config.import=optional:file:.env
app.realtime-workload.publish-enabled=${REALTIME_WORKLOAD_PUBLISH_ENABLED:${env.REALTIME_WORKLOAD_PUBLISH_ENABLED:true}}
app.realtime-workload.summary-enabled=${REALTIME_WORKLOAD_SUMMARY_ENABLED:${env.REALTIME_WORKLOAD_SUMMARY_ENABLED:false}}
app.realtime-workload.publish-interval-ms=${REALTIME_WORKLOAD_PUBLISH_INTERVAL_MS:${env.REALTIME_WORKLOAD_PUBLISH_INTERVAL_MS:5000}}
app.realtime-workload.snapshot-ttl-ms=${REALTIME_WORKLOAD_SNAPSHOT_TTL_MS:${env.REALTIME_WORKLOAD_SNAPSHOT_TTL_MS:30000}}
app.realtime-workload.top-room-limit=${REALTIME_WORKLOAD_TOP_ROOM_LIMIT:${env.REALTIME_WORKLOAD_TOP_ROOM_LIMIT:10}}
app.realtime-workload.watch-ratio=${REALTIME_WORKLOAD_WATCH_RATIO:${env.REALTIME_WORKLOAD_WATCH_RATIO:0.7}}

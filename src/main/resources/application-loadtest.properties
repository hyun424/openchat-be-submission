# ===============================
# Loadtest Profile: SQL 로깅 비활성화 (dev 프로필 대비 20~50% 성능 개선)
# ===============================
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update

# ===============================
# Loadtest Profile: Rate limit 완화
# ===============================
ratelimit.api.auth.limit=10000
ratelimit.api.auth.window-seconds=60
ratelimit.api.limit=10000
ratelimit.api.window-seconds=60

# Non-production fallback secret for local/dev/loadtest only.
jwt.secret=${env.JWT_SECRET:change-me-loadtest-jwt-secret-32-chars-minimum}

# ===============================
# Dev Profile: DDL auto (개발환경에서만 auto-update)
# ===============================
spring.jpa.hibernate.ddl-auto=update

# ===============================
# Dev Profile: Relaxed rate limits for load testing
# ===============================
ratelimit.api.auth.limit=10000
ratelimit.api.auth.window-seconds=60
ratelimit.api.limit=10000
ratelimit.api.window-seconds=60

# ===============================
# Dev Profile: SQL logging (production에서는 비활성화)
# WARNING: 부하 테스트 시 dev 프로필을 사용하지 마세요. SQL 로깅이 심각한 성능 저하를 유발합니다.
# ===============================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Non-production fallback secret for local/dev/loadtest only.
jwt.secret=${env.JWT_SECRET:change-me-local-dev-jwt-secret-32-chars-minimum}

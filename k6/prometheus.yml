global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Spring Boot Actuator (Prometheus endpoint)
  - job_name: 'openchat-app-lb'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          application: 'openchat'
          instance: 'lb-entrypoint'

  # Spring Boot Actuator per load-test app container.
  # Some targets are absent depending on the active compose profile.
  - job_name: 'openchat-app-containers'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets:
          - 'openchat-app-up-small:8080'
          - 'openchat-app-out-small-1:8080'
          - 'openchat-app-out-small-2:8080'
          - 'openchat-app-up-large:8080'
          - 'openchat-app-out-large-1:8080'
          - 'openchat-app-out-large-2:8080'
        labels:
          application: 'openchat'

  # MySQL Exporter
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # cAdvisor (container metrics)
  - job_name: 'cadvisor'
    scrape_interval: 10s
    static_configs:
      - targets: ['cadvisor:8080']

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
